name: ci-pipeline

on:
    pull_request:
        branches: ["main"]

    push:
        branches:
            - main
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Go env
              uses: actions/setup-go@v4
              with:
                  go-version: 1.25.0

            - name: run unit test
              run: make test

            - name: login to docker
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: build and push
              uses: docker/build-push-action@v7
              with:
                  push: true
                  tags: leopardbeo/bookmark-management:latest
